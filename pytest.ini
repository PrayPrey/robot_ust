[pytest]
# Enable src/ module imports without installation
pythonpath = .

# Test discovery settings
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output settings (verbose, short traceback, strict markers, suppress warnings)
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    last: marks tests to run last (for evaluation summary)

# Async test support (for CrewAI async agents)
asyncio_mode = auto
